services:
  db:
    image: postgres:16
    container_name: academia_db
    restart: always
    environment:
      POSTGRES_USER: academia_user
      POSTGRES_PASSWORD: academia_pass
      POSTGRES_DB: academia_sync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: